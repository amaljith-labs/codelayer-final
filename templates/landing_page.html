{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'icons/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <title>{% block title %}{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="navbar-wrapper">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="{% static 'images/codelayer.png' %}" alt="logo" class="codelayer-logo">
        </a>
      </div>
    </nav>
    </div>

    <main style="">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-4 mt-5" style="background-color: #f4faf8; border-top: 1px solid rgba(30,200,160,0.1);">
        <div class="container text-center">
            <p class="mb-0" style="color: #6b8580; font-size: 0.9rem;">
                &copy; 2026 Codelayer Technologies. All Rights Reserved.
            </p>
        </div>
    </footer>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" ...></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" ...></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>


    <!-- Then your scripts -->
    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/mouse_pointer.js' %}"></script>
    <script src="{% static 'js/lottie_animation.js' %}"></script>
    <script src="{% static 'js/testimonial.js' %}"></script>
    <script src="{% static 'js/product_features.js' %}"></script>
    <script src="{% static 'js/jobFilter.js' %}"></script>
    <script src="{% static 'js/contactForm.js' %}"></script>
    <script src="{% static 'js/gallery.js' %}"></script>
    <script src="{% static 'js/landingPageForm.js' %}"></script>


    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.8/dist/dotlottie-wc.js" type="module"></script>
</body>
</html>
