{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'icons/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <title>{% block title %}Codelayer Technologies{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    <div class="overflow-hidden">
      {% include "navbar.html" %}

      {% block content %}
      {% endblock %}

      {% include "footer.html" %}

      <!-- Whatsapp float-->
      <a href="tel:+919387111122 " class="btn-whatsapp-pulse d-none" style="background: #000; z-index: 2000;">
        <i class="bi bi-telephone" style="font-size:0.8em;"></i>
      </a>

      <a href="https://api.whatsapp.com/send?phone=918974563321&amp;text=Welcome to Codelayer Technologies" class="btn-whatsapp-pulse btn-whatsapp-pulse-border" style="z-index: 2000;">
          <i class="bi bi-whatsapp" style="color:#fffefe; font-size:0.8em;"></i>
      </a>

      <button onclick="topFunction()" id="myBtn" title="Go to top" style="display: block;"><i class="bi bi-arrow-up" style="font-size: 1.5rem;"></i></button>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" ...></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" ...></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>


    <!-- Then your scripts -->
    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/mouse_pointer.js' %}"></script>
    <script src="{% static 'js/lottie_animation.js' %}"></script>
    <script src="{% static 'js/testimonial.js' %}"></script>
    <script src="{% static 'js/product_features.js' %}"></script>
    <script src="{% static 'js/jobFilter.js' %}"></script>
    <script src="{% static 'js/contactForm.js' %}"></script>
    <script src="{% static 'js/gallery.js' %}"></script>
    <script src="{% static 'js/landingPageForm.js' %}"></script>


    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.8/dist/dotlottie-wc.js" type="module"></script>

  </body>
</html>
